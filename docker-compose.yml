# Local dev — mirrors the Azure App Service sidecar architecture:
#   app         → PHP app with ddtrace (the image you push to ACR)
#   dd-sidecar  → datadog/serverless-init (same image used as sidecar in Azure Portal)
#
# In Azure, both containers share localhost; here they communicate over the internal network.
# The only env var that differs between local and Azure is DD_TRACE_AGENT_URL.

services:

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DD_SERVICE: kredit-plus
      DD_ENV: local
      DD_VERSION: "1.0.0"

      # In Azure App Service the sidecar shares localhost → http://localhost:8126
      # In docker-compose the sidecar is a separate container → http://dd-sidecar:8126
      DD_TRACE_AGENT_URL: http://dd-sidecar:8126
      DD_DOGSTATSD_URL: udp://dd-sidecar:8125

      DD_TRACE_ENABLED: "true"
      DD_LOGS_INJECTION: "true"
    depends_on:
      - dd-sidecar

  dd-sidecar:
    image: datadog/serverless-init:latest
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}

      # Matches what Azure App Service sets when you configure the sidecar
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_SERVICE: kredit-plus
      DD_ENV: local
    ports:
      - "8126:8126"
      - "8125:8125/udp"
    # serverless-init needs to run as a daemon, not wrap another process
    command: ["tail", "-f", "/dev/null"]
