# Local dev — solo la imagen de la aplicación.
# El sidecar de Datadog (datadog/serverless-init) se agrega en Azure Portal.
#
# Para probar con trazas en local, define DD_AGENT_HOST apuntando
# a un Datadog Agent que tengas corriendo, o deja las variables vacías
# para correr la app sin APM.

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DD_SERVICE: kredit-plus
      DD_ENV: local
      DD_VERSION: "1.0.0"
      DD_TRACE_ENABLED: "true"
      DD_LOGS_INJECTION: "true"
      # Apunta a localhost:8126 en Azure (sidecar comparte network namespace)
      # En local sobreescribe con: DD_TRACE_AGENT_URL=http://<tu-agent-host>:8126
      DD_TRACE_AGENT_URL: ${DD_TRACE_AGENT_URL:-http://localhost:8126}
